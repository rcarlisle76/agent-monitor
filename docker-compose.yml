version: "3.9"

services:
  backend:
    build: ./backend
    image: rcarlisle1976/agent-monitor-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - DB_PATH=/app/data/agent_monitor.db
      - ACCURACY_FLAG_THRESHOLD=70.0   # flag agents whose accuracy drops below this
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: rcarlisle1976/agent-monitor-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  app_net:
